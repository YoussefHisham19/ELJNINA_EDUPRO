<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ابدأ الآن - Eljnina</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col pt-24 text-slate-900">
    <div id="navbar-container"></div>

    <main class="flex-1 pb-12 px-8 max-w-7xl mx-auto w-full">
        <div class="max-w-2xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-white mx-auto mb-6 shadow-xl shadow-emerald-200 animate-float">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                </div>
                <h1 class="text-4xl font-black text-slate-900 mb-4 tracking-tighter italic">Eljnina / <span class="text-emerald-500">الجنينة</span></h1>
                <p class="text-slate-500 font-bold italic">نظام متكامل لإدارة حصصك وطلابك واختباراتك بدون تعقيد.</p>
            </div>

            <!-- Choice Mode -->
            <div id="choice-mode" class="space-y-6">
                <button onclick="setMode('new')" class="w-full p-10 bg-white border-4 border-emerald-500 rounded-[3rem] text-center group hover:bg-emerald-50 transition-all shadow-xl shadow-emerald-100">
                    <div class="w-14 h-14 bg-emerald-500 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <h3 class="text-3xl font-black text-slate-900 mb-2 italic">مدرس جديد</h3>
                    <p class="text-sm font-bold text-slate-500 tracking-tighter">أريد إنشاء نظام تعليمي خاص بي لأول مرة</p>
                </button>
                <button onclick="setMode('returning')" class="w-full p-10 bg-slate-900 border-4 border-slate-900 rounded-[3rem] text-center group hover:bg-slate-800 transition-all shadow-2xl">
                    <div class="w-14 h-14 bg-white/10 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <h3 class="text-3xl font-black text-white mb-2 italic">عندي نظام بالفعل</h3>
                    <p class="text-sm font-bold text-white/50 tracking-tighter">سجلت مسبقاً وأريد الدخول للوحة التحكم</p>
                </button>
            </div>

            <!-- New Teacher Form -->
            <div id="new-mode" class="hidden bg-white p-8 md:p-12 rounded-[3.5rem] shadow-2xl border border-slate-100">
                <button onclick="setMode('choice')" class="text-xs font-black text-emerald-500 uppercase tracking-widest mb-6 flex items-center gap-2 hover:translate-x-2 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> العودة للخلف
                </button>
                <form id="onboarding-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">اسمك الكريم</label>
                            <input required type="text" id="name" placeholder="الأستاذ / ..." class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-emerald-500 outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">المادة العلمية</label>
                            <input required type="text" id="subject" placeholder="رياضيات، فيزياء..." class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-emerald-500 outline-none transition-all font-bold">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">معرف المعلم (Teacher ID)</label>
                            <input required type="text" id="id" placeholder="مثلاً: ahmed_math_123" class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-emerald-500 outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">كلمة المرور</label>
                            <input required type="password" id="password" placeholder="اختر كلمة مرور قوية" class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-emerald-500 outline-none transition-all font-bold">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">رقم الواتساب الخاص بك</label>
                        <input required type="tel" id="whatsapp" placeholder="مثلاً: 01109163370" class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-emerald-500 outline-none transition-all font-bold">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">رابط الحصة (Zoom / Meet) - اختياري</label>
                            <input type="url" id="zoom" placeholder="https://zoom.us/j/..." class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-emerald-500 outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">رابط الاختبار (Google Forms) - اختياري</label>
                            <input type="url" id="exam" placeholder="https://forms.gle/..." class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-emerald-500 outline-none transition-all font-bold">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">اختر باقة الاشتراك (7 أيام مجاناً)</label>
                        <select id="plan-selector" class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-emerald-500 outline-none transition-all font-bold text-slate-700">
                            <option value="basic">باقة البداية (50 طالب) - 199 ج.م</option>
                            <option value="silver">باقة النمو (75 طالب) - 299 ج.م</option>
                            <option value="gold">باقة الاحتراف (100 طالب) - 399 ج.م</option>
                            <option value="unlimited">باقة المؤسسات (مفتوح) - تفاوض</option>
                        </select>
                    </div>

                    <button type="submit" id="submit-btn" class="flex items-center justify-center gap-3 bg-emerald-500 hover:bg-emerald-600 text-white font-black rounded-[2rem] transition-all shadow-lg shadow-emerald-200 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed w-full py-5 text-xl">إنشاء منصتي المحترفة الآن</button>
                </form>
            </div>

            <!-- Returning Teacher Form -->
            <div id="returning-mode" class="hidden bg-white p-8 md:p-12 rounded-[3.5rem] shadow-2xl border border-slate-100">
                <button onclick="setMode('choice')" class="text-xs font-black text-emerald-500 uppercase tracking-widest mb-6 flex items-center gap-2 hover:translate-x-2 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> العودة للخلف
                </button>
                <form id="returning-form" class="space-y-8">
                    <div>
                        <h4 class="text-2xl font-black text-slate-900 mb-2 tracking-tighter">أهلاً بك مرة أخرى</h4>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-8">ادخل بياناتك للدخول للوحة التحكم</p>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">معرف المعلم (Teacher ID)</label>
                                <input required type="text" id="returning-id" placeholder="مثلاً: ahmed_math_123" class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-emerald-500 outline-none transition-all font-bold text-slate-700 text-center font-mono">
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">كلمة المرور</label>
                                <input required type="password" id="returning-password" placeholder="••••••••" class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-emerald-500 outline-none transition-all font-bold text-slate-700 text-center">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="flex items-center justify-center gap-3 bg-slate-900 hover:bg-slate-800 text-white font-black rounded-[2rem] transition-all shadow-lg shadow-slate-200 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed w-full py-5 text-xl">دخول لوحة التحكم</button>
                    
                    <div class="text-center">
                        <a href="https://wa.me/201109163370?text=نسيت كلمة المرور الخاصة بحسابي" class="text-[10px] font-black text-slate-400 hover:text-emerald-500 uppercase tracking-widest transition-colors">
                            نسيت كلمة المرور؟ تواصل مع الدعم
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script type="module">
        import common from './common.js';

        window.setMode = (mode) => {
            const sections = ['choice-mode', 'new-mode', 'returning-mode'];
            sections.forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(mode + '-mode').classList.remove('hidden');
        };

        const savedAdmin = localStorage.getItem('eljnina_admin_id');
        const urlParams = new URLSearchParams(window.location.search);
        
        const requestedPlan = urlParams.get('plan');
        if (requestedPlan) {
            const selector = document.getElementById('plan-selector');
            if (selector) selector.value = requestedPlan;
        }

        if (savedAdmin && !urlParams.get('force')) {
            window.location.href = `manage.html?teacher=${savedAdmin}`;
        }

        common.injectNavigation('start');
        common.injectFooter();

        document.getElementById('onboarding-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            if (!common.supabase) {
                alert('⚠️ لم يتم ربط قاعدة البيانات بعد.');
                return;
            }
            submitBtn.disabled = true;
            submitBtn.innerText = 'جاري إنشاء منصتك...';

            const id = document.getElementById('id').value.toLowerCase().replace(/\s/g, '_');
            const payload = {
                id: id,
                name: document.getElementById('name').value,
                subject: document.getElementById('subject').value,
                whatsapp: document.getElementById('whatsapp').value,
                lesson_link: document.getElementById('zoom').value,
                exam_link: document.getElementById('exam').value,
                password: document.getElementById('password').value,
                subscription_tier: document.getElementById('plan-selector').value,
                is_active: true,
                trial_expires_at: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
            };

            try {
                const { error } = await common.supabase.from('teachers').insert([payload]);
                if (error) throw error;
                localStorage.setItem('eljnina_admin_id', id);
                window.location.href = `success.html?teacher=${id}`;
            } catch (err) {
                alert('خطأ في التسجيل: ' + (err.message.includes('unique') ? 'هذا المعرف مستخدم بالفعل.' : err.message));
                submitBtn.disabled = false;
                submitBtn.innerText = 'إنشاء منصتي المحترفة الآن';
            }
        });

        document.getElementById('returning-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('returning-id').value.toLowerCase().trim();
            const password = document.getElementById('returning-password').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;
            submitBtn.innerText = 'جاري التحقق...';

            try {
                const { data, error } = await common.supabase
                    .from('teachers')
                    .select('id, password')
                    .eq('id', id)
                    .single();

                if (error || !data) throw new Error('المعرف غير موجود');
                if (data.password && data.password !== password) throw new Error('كلمة المرور غير صحيحة');

                localStorage.setItem('eljnina_admin_id', id);
                window.location.href = `manage.html?teacher=${id}`;
            } catch (err) {
                alert('خطأ في الدخول: ' + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = 'دخول لوحة التحكم';
            }
        });
    </script>
</body>
</html>
