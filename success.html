<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجاح - Eljnina</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col pt-24">
    <div id="navbar-container"></div>

    <main class="flex-1 pb-12 px-8 max-w-7xl mx-auto w-full">
        <div class="max-w-3xl mx-auto text-center">
            <div class="bg-white p-12 rounded-[4rem] shadow-2xl border-4 border-emerald-500 relative overflow-hidden">
                <div class="w-24 h-24 bg-emerald-500 text-white rounded-full flex items-center justify-center mx-auto mb-8 shadow-2xl">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <h2 class="text-5xl font-black text-slate-900 mb-4 tracking-tighter">مبروك <span id="teacher-name-display" class="text-emerald-500">...</span>!</h2>
                <p class="text-2xl font-bold text-emerald-600 mb-10 italic">"ابعته للطلبة وابدأ فورًا"</p>

                <div class="space-y-4 max-w-md mx-auto">
                    <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100 flex flex-col gap-3">
                        <p class="text-xs font-black uppercase tracking-widest text-slate-400">رابط الطلاب</p>
                        <div class="bg-white p-3 rounded-xl border border-slate-200 truncate font-mono text-emerald-600" id="student-url">...</div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <a id="manage-link" class="p-5 bg-slate-900 text-white rounded-3xl font-black text-xs uppercase tracking-widest hover:bg-slate-800 transition-all">بوابة الإدارة</a>
                        <a id="dashboard-link" class="p-5 bg-white border-2 border-slate-900 text-slate-900 rounded-3xl font-black text-xs uppercase tracking-widest hover:bg-slate-50 transition-all">الإحصائيات</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script type="module">
        import common from './common.js';
        
        const params = new URLSearchParams(window.location.search);
        const id = params.get('teacher');

        common.injectNavigation('success');
        common.injectFooter();

        async function init() {
            if (id && common.supabase) {
                const { data } = await common.supabase.from('teachers').select('name').eq('id', id).single();
                if (data) {
                    document.getElementById('teacher-name-display').innerText = data.name;
                    common.injectNavigation('success', data.name);
                }
                document.getElementById('student-url').innerText = `${window.location.origin}${window.location.pathname.replace('success.html', 'student.html')}?teacher=${id}`;
                document.getElementById('manage-link').href = `manage.html?teacher=${id}`;
                document.getElementById('dashboard-link').href = `dashboard.html?teacher=${id}`;
            }
        }
        init();
    </script>
</body>
</html>
